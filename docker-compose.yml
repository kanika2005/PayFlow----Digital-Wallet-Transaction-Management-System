version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: wallet-mysql
    environment:
      MYSQL_DATABASE: walletdb
      MYSQL_ROOT_PASSWORD: Kanika@123
      MYSQL_USER: wallet
      MYSQL_PASSWORD: Kanika@123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: wallet-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/walletdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: wallet
      SPRING_DATASOURCE_PASSWORD: walletpass
      JWT_SECRET: change-this-secret-key-to-a-long-random-value-at-least-32-chars
      JWT_EXPIRATION_MS: 86400000
      APP_ADMIN_EMAIL: admin@wallet.com
      APP_ADMIN_PASSWORD: Admin@12345
    ports:
      - "8080:8080"

volumes:
  mysql_data:
