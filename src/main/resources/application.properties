spring.application.name=wallet-system
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/walletdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:wallet}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:walletpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:change-this-secret-key-to-a-long-random-value-at-least-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.admin.email=${APP_ADMIN_EMAIL:admin@wallet.com}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@12345}

server.port=8080